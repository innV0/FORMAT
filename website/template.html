<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:image" content="{{og_image}}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="robots" content="index, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.slate.min.css">
  <style>
    :root {
      --pico-font-family: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    /* ── NAV ── */
    header > nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid var(--pico-muted-border-color);
      padding: 0 var(--pico-spacing);
    }
    .nav-brand {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: var(--pico-color);
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 6rem 1rem 4rem;
    }
    .hero h1 {
      font-family: var(--mono);
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .hero h2 {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      color: var(--pico-primary);
      border: none;
      margin-bottom: 1.5rem;
    }
    .hero p {
      max-width: 52ch;
      margin: 0 auto 2rem;
      color: var(--pico-muted-color);
    }
    .hero a[href] {
      margin: 0.25rem 0.375rem;
      display: inline-block;
    }
    .hero a:first-of-type {
      background: var(--pico-primary);
      color: #fff;
      border-radius: var(--pico-border-radius);
      padding: 0.6rem 1.5rem;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9375rem;
    }
    .hero a:last-of-type {
      border: 1px solid var(--pico-muted-border-color);
      color: var(--pico-muted-color);
      border-radius: var(--pico-border-radius);
      padding: 0.6rem 1.5rem;
      text-decoration: none;
      font-size: 0.9375rem;
    }

    /* ── SECTIONS ── */
    section { padding: 4rem 0; }
    section + section { border-top: 1px solid var(--pico-muted-border-color); }
    .hero + section { border-top: none; }

    /* ── BLOCKQUOTE as pitch ── */
    blockquote { border-left: 3px solid var(--pico-primary); }

    /* ── HOW IT WORKS: numbered steps ── */
    .section-3 ol {
      counter-reset: steps;
      list-style: none;
      padding: 0;
      display: grid;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .section-3 ol li {
      counter-increment: steps;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
    }
    .section-3 ol li::before {
      content: counter(steps);
      flex-shrink: 0;
      width: 1.75rem;
      height: 1.75rem;
      background: var(--pico-primary);
      color: #fff;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.1rem;
    }

    /* ── OPEN STANDARDS: pill tags ── */
    .section-7 { text-align: center; }
    .section-7 ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    .section-7 ul li {
      padding: 0.35rem 1rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 2rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--pico-primary);
    }
    .section-7 p { max-width: none; }

    /* ── DEMO SPLIT ── */
    .demo-split {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1.5rem;
      align-items: center;
      margin: 2rem 0;
    }
    .demo-col { display: flex; flex-direction: column; gap: 0.75rem; min-width: 0; overflow: hidden; }
    .demo-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--pico-muted-color);
      margin-bottom: 0.25rem;
    }
    .demo-label code {
      font-size: 0.75rem;
      background: none;
      padding: 0;
      color: var(--pico-primary);
    }
    .demo-code {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 1.25rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      line-height: 1.65;
      overflow-x: auto;
      white-space: pre;
      margin: 0;
      color: var(--pico-muted-color);
      width: 100%;
      box-sizing: border-box;
    }
    .dm-comment { color: var(--pico-primary); opacity: 0.7; }
    .dm-bullet  { color: var(--pico-primary); font-weight: 700; }
    .dm-item    { color: var(--pico-color); font-weight: 500; }

    .demo-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--pico-primary);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .demo-arrow svg { width: 2rem; height: 2rem; }
    .demo-arrow-line {
      width: 1px;
      height: 2rem;
      background: var(--pico-muted-border-color);
    }

    /* demo UI panel */
    .demo-ui {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      overflow: hidden;
      background: var(--pico-card-background-color);
    }
    .ui-concept { padding: 0; }
    .ui-concept-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: var(--pico-primary);
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
    }
    .ui-emoji { font-size: 1rem; }
    .ui-name  { flex: 1; }
    .ui-count {
      background: rgba(255,255,255,0.25);
      border-radius: 1rem;
      padding: 0.05rem 0.5rem;
      font-size: 0.7rem;
    }
    .ui-elements { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.375rem; }
    .ui-element {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: calc(var(--pico-border-radius) * 0.6);
      color: var(--pico-color);
      flex: 1;
    }
    .ui-score { margin-left: auto; font-size: 0.6rem; letter-spacing: -1px; }
    .ui-score.high { color: var(--pico-primary); }
    .ui-score.mid  { color: var(--pico-muted-color); }

    /* matrix inside demo */
    .ui-matrix { border-top: 1px solid var(--pico-muted-border-color); padding: 0.625rem 0.75rem; }
    .ui-matrix-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--pico-muted-color);
      margin-bottom: 0.4rem;
    }
    .ui-matrix-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.65rem;
      margin: 0;
      table-layout: fixed;
    }
    .ui-matrix-table th, .ui-matrix-table td {
      padding: 0.2rem 0.3rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--pico-muted-border-color);
      text-align: center;
    }
    .ui-matrix-table td:first-child { text-align: left; color: var(--pico-muted-color); }
    .ui-matrix-table th { background: var(--pico-card-sectioning-background-color); font-weight: 500; }
    .cell-max  { background: rgba(79,130,243,0.15); color: var(--pico-primary); font-weight: 600; }
    .cell-high { background: rgba(79,130,243,0.07); color: var(--pico-primary); }
    .cell-neu  { color: var(--pico-muted-color); }

    @media (max-width: 700px) {
      .demo-split {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .demo-arrow { flex-direction: row; }
      .demo-arrow-line { width: 2rem; height: 1px; }
    }

    /* ── PRICING CTA buttons ── */
    .section-6 a {
      display: inline-block;
      margin: 1rem 0.375rem 0;
      padding: 0.6rem 1.4rem;
      border-radius: var(--pico-border-radius);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
    }
    .section-6 a:first-of-type {
      background: var(--pico-primary);
      color: #fff;
    }
    .section-6 a:last-of-type {
      border: 1px solid var(--pico-muted-border-color);
      color: var(--pico-muted-color);
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul><li><a class="nav-brand" href="/">FORMAT</a></li></ul>
      <ul>
        <li><a href="#get-started">Get started</a></li>
        <li><a href="../docs/v1.0.0/format-spec.md">Spec</a></li>
        <li><a href="https://github.com/innV0/FORMAT">GitHub</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    {{content}}
  </main>

  <footer class="container">
    <small>
      FORMAT · Open-source · MIT License ·
      <a href="https://github.com/innV0/FORMAT">GitHub</a> ·
      <a href="mailto:lucas@lucascervera.com">Contact</a>
    </small>
  </footer>
</body>
</html>

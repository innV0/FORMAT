<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:image" content="{{og_image}}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="robots" content="index, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090f;
      --surface:  #0e0f1c;
      --border:   #1a1d35;
      --text:     #dde1f5;
      --muted:    #6b7280;
      --accent:   #4f8ef7;
      --accent2:  #38e5c4;
      --danger:   #f87171;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Inter', system-ui, sans-serif;
      --max:      72rem;
      --r:        0.75rem;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 1.0625rem;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(9, 9, 15, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .nav-brand {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── LAYOUT ── */
    section {
      padding: 6rem 2rem;
      max-width: var(--max);
      margin: 0 auto;
    }

    /* ── HERO ── */
    .hero {
      padding: 8rem 2rem 6rem;
      text-align: center;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(79,142,247,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 120%, rgba(56,229,196,0.06), transparent);
      pointer-events: none;
    }
    .hero h1 {
      font-family: var(--mono);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .hero h2 {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      color: var(--accent2);
      margin-bottom: 1.75rem;
      border: none;
      padding: 0;
      letter-spacing: 0.01em;
    }
    .hero p {
      max-width: 52ch;
      margin: 0 auto 2.5rem;
      color: var(--muted);
      font-size: 1.0625rem;
      line-height: 1.75;
    }
    .hero a {
      display: inline-block;
      margin: 0.375rem 0.5rem;
      padding: 0.7rem 1.6rem;
      border-radius: var(--r);
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .hero a:first-of-type {
      background: var(--accent);
      color: #fff;
    }
    .hero a:first-of-type:hover { background: #3a7eef; transform: translateY(-1px); }
    .hero a:last-of-type {
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .hero a:last-of-type:hover { border-color: var(--accent); color: var(--text); }

    /* ── SECTION HEADERS ── */
    section h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    section h3 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--accent2);
      margin: 2rem 0 0.5rem;
    }

    /* ── BODY TEXT ── */
    section p { color: var(--muted); margin-bottom: 1rem; max-width: 68ch; }
    section strong { color: var(--text); font-weight: 600; }
    section em { color: var(--text); font-style: italic; }

    /* ── LISTS ── */
    section ul, section ol {
      padding-left: 1.5rem;
      margin: 1rem 0;
    }
    section li {
      color: var(--muted);
      margin-bottom: 0.5rem;
      padding-left: 0.25rem;
    }
    section li strong { color: var(--text); }

    /* ── BLOCKQUOTE (testimonial/pitch) ── */
    section blockquote {
      margin: 2rem 0;
      padding: 1.25rem 1.75rem;
      border-left: 3px solid var(--accent);
      background: var(--surface);
      border-radius: 0 var(--r) var(--r) 0;
    }
    section blockquote p {
      color: var(--text);
      font-style: italic;
      font-size: 1.0625rem;
      max-width: none;
      margin: 0;
    }

    /* ── ORDERED LIST (how it works) ── */
    .section-3 ol {
      counter-reset: steps;
      list-style: none;
      padding: 0;
      display: grid;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .section-3 ol li {
      counter-increment: steps;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.125rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--muted);
    }
    .section-3 ol li::before {
      content: counter(steps);
      flex-shrink: 0;
      width: 1.75rem; height: 1.75rem;
      background: var(--accent);
      color: #fff;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 0.125rem;
    }

    /* ── FEATURE CARDS (segments + products) ── */
    .section-4 h3, .section-5 h3 {
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r) var(--r) 0 0;
      margin: 1.5rem 0 0;
    }
    .section-4 h3 + p, .section-5 h3 + p {
      padding: 0 1.5rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--r) var(--r);
      margin: 0 0 0.25rem;
      max-width: none;
    }

    /* ── PRICING TABLE ── */
    section table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9375rem;
    }
    section th {
      text-align: left;
      padding: 0.75rem 1rem;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.8125rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
    }
    section td {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }
    section tr:last-child td { border-bottom: none; }
    section td:first-child { color: var(--text); font-weight: 500; }
    section td:nth-child(2) { font-family: var(--mono); color: var(--accent2); }

    /* ── PRICING SECTION CTA ── */
    .section-6 a {
      display: inline-block;
      margin: 1.25rem 0.5rem 0;
      padding: 0.65rem 1.5rem;
      border-radius: var(--r);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .section-6 a:first-of-type {
      background: var(--accent);
      color: #fff;
    }
    .section-6 a:first-of-type:hover { background: #3a7eef; }
    .section-6 a:last-of-type {
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .section-6 a:last-of-type:hover { border-color: var(--accent); color: var(--text); }

    /* ── OPEN STANDARDS (last section) ── */
    .section-7 {
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .section-7 ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .section-7 ul li {
      padding: 0.4rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent2);
      margin: 0;
    }
    .section-7 ul li strong {
      color: var(--accent2);
    }
    .section-7 p { text-align: center; margin: 0 auto; }
    .section-7 a { color: var(--accent); text-decoration: none; }
    .section-7 a:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8125rem;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* ── DIVIDER between sections ── */
    section + section {
      border-top: 1px solid var(--border);
    }
    .hero + section { border-top: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav { padding: 0 1rem; }
      .nav-links { gap: 1rem; }
      section { padding: 4rem 1.25rem; }
      .hero { padding: 5rem 1.25rem 4rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">FORMAT</a>
    <div class="nav-links">
      <a href="#pricing">Pricing</a>
      <a href="../DOCS/v1.0.0/format-spec.md">Spec</a>
      <a href="https://github.com/innV0/FORMAT">GitHub</a>
    </div>
  </nav>

  <main>
    {{content}}
  </main>

  <footer>
    <p>
      FORMAT · Open-source · MIT License ·
      <a href="https://github.com/innV0/FORMAT">GitHub</a> ·
      <a href="mailto:lucas@lucascervera.com">Contact</a>
    </p>
  </footer>
</body>
</html>

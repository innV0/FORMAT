project: FORMAT
context: |
  Vue 3 + TypeScript application for business model specification using a custom
  FORMAT format (Business and Procedures templates). Data-driven frontend with
  Pinia state management, Tailwind CSS, and Vite build tooling.
strict_tdd: true
delivery_strategy: ask-on-risk
execution_mode: auto
testing:
  strict_tdd: true
  runner: vitest
  framework: vitest@1.6.0
  layers:
    unit: { available: true, tool: vitest + @vue/test-utils + happy-dom }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage:
    available: false
    command: null
  quality:
    linter: { available: false, command: null }
    type_checker: { available: true, command: "vue-tsc --noEmit" }
    formatter: { available: false, command: null }
phase_rules:
  proposal: "Define goals, user stories, and acceptance criteria."
  spec: "Write specifications in openspec/specs/."
  design: "Plan architectural and component design."
  tasks: "Break down execution into commits and PRs."
  apply: "Implement task units."
  verify: "Run linting, formats, and manual/automated checks."
  archive: "Consolidate and archive completed changes."

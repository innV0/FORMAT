<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>_FORMAT — Business Strategy as Code</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="One structured Markdown file gives any AI model instant, complete context of your entire business.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    .skip-link { position: absolute; top: -9999px; left: 0; z-index: 1000; padding: 8px 16px; background: #7c3aed; color: #fff; font-size: 14px; font-weight: 600; text-decoration: none; border-radius: 0 0 4px 0; }
    .skip-link:focus { top: 0; }
    :root {
      --base-font-size: 15px;
      --theme-color: #7c3aed;
      --link-color: #7c3aed;
      --sidebar-width: 260px;
      --sidebar-nav-link-color--active: #7c3aed;
      --sidebar-nav-link-border-color--active: #7c3aed;
      --cover-background-color: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --cover-heading-color: #fff;
      --cover-color: #ccc;
      --cover-link-color: #a78bfa;
    }
    .app-nav { position: fixed; top: 0; right: 0; z-index: 100; padding: 10px 20px; }
    .app-nav a { color: var(--theme-color); font-weight: 600; margin-left: 18px; text-decoration: none; font-size: 14px; }
    .app-nav a:hover { text-decoration: underline; }
    .markdown-section h1 { border-bottom: 2px solid var(--theme-color); padding-bottom: 8px; }
    .markdown-section h2 { border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; margin-top: 2em; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 90%; }
    .markdown-section pre > code { background: transparent; padding: 0; }
    .how-to-step { background: #f9fafb; border-left: 4px solid var(--theme-color); padding: 16px 20px; margin: 16px 0; border-radius: 0 8px 8px 0; }
    .how-to-step h3 { margin-top: 0; color: var(--theme-color); }
    .tip-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 14px 18px; margin: 14px 0; }
    .tip-box::before { content: "💡 "; font-size: 16px; }
    .warning-box { background: #fef3c7; border: 1px solid #fbbf24; border-radius: 8px; padding: 14px 18px; margin: 14px 0; }
    .warning-box::before { content: "⚠️ "; font-size: 16px; }

    /* ── Same file → Two views contrast header ── */
    .contrast-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 24px 0 16px; }
    .contrast-badge { display: inline-block; padding: 6px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; background: #f3f0ff; color: #5b21b6; border: 2px solid #7c3aed; }
    .contrast-badge-visual { background: #5b21b6; color: #fff; border-color: #5b21b6; }
    .contrast-arrow { font-size: 22px; color: #7c3aed; font-weight: 700; }

    /* ── Demo split: raw .md vs app visualization ── */
    .demo-split { display: flex; gap: 16px; align-items: stretch; margin: 16px 0 24px; flex-wrap: wrap; }
    .demo-col { flex: 1; min-width: 280px; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; }
    .demo-label { background: #f9fafb; padding: 8px 14px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
    .demo-code { background: #1e1e2e; color: #cdd6f4; padding: 14px 16px; font-size: 12.5px; line-height: 1.6; overflow-x: auto; margin: 0; border-radius: 0 0 10px 10px; }
    .dm-comment { color: #6c7086; }
    .dm-bullet { color: #89b4fa; }
    .dm-item { color: #f5c2e7; }
    .demo-arrow { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #7c3aed; font-weight: 700; font-size: 13px; min-width: 40px; }
    .demo-arrow-line { display: none; }
    .demo-ui { padding: 14px; background: #fafafa; }
    .ui-concept { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .ui-concept-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; font-size: 13px; font-weight: 600; }
    .ui-emoji { font-size: 16px; }
    .ui-name { flex: 1; color: #111827; }
    .ui-count { background: #e5e7eb; padding: 0 8px; border-radius: 10px; font-size: 11px; color: #4b5563; }
    .ui-elements { padding: 8px 14px; }
    .ui-element { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; color: #374151; border-bottom: 1px solid #f3f4f6; }
    .ui-element:last-child { border-bottom: none; }
    .ui-score { margin-left: auto; font-size: 11px; }
    .ui-score.high { color: #059669; }
    .ui-matrix { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
    .ui-matrix-label { padding: 10px 14px; font-size: 12px; font-weight: 600; color: #6b7280; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
    .ui-matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .ui-matrix-table th { background: #f3f4f6; padding: 6px 10px; text-align: left; font-weight: 600; color: #374151; border-bottom: 1px solid #e5e7eb; }
    .ui-matrix-table td { padding: 6px 10px; border-bottom: 1px solid #f3f4f6; }
    .cell-max { color: #059669; font-weight: 700; }
    .cell-high { color: #65a30d; font-weight: 600; }
    .cell-neu { color: #9ca3af; }

    /* ── Template cards ── */
    .template-cards { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
    .template-card { flex: 1; min-width: 200px; display: block; padding: 18px 20px; border: 2px solid #e5e7eb; border-radius: 10px; text-decoration: none; color: inherit; transition: border-color .15s, box-shadow .15s; }
    .template-card:hover { border-color: #7c3aed; box-shadow: 0 2px 12px rgba(124,58,237,.12); }
    .template-card strong { display: block; font-size: 16px; margin-bottom: 4px; color: #111827; }
    .template-card span { font-size: 13px; color: #6b7280; }

    /* ── Pipeline steps ── */
    .pipeline-steps { display: flex; flex-direction: column; gap: 20px; margin: 16px 0; }
    .pipeline-step { background: #fafafa; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px 20px; }
    .pipeline-step h3 { margin-top: 0 !important; border-bottom: none !important; font-size: 15px !important; color: #111827 !important; }
    .pipeline-step p { margin: 6px 0 12px; color: #4b5563; }
    .pipeline-step .mermaid { margin: 8px 0 0; }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

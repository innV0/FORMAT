<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>_FORMAT — Business Strategy as Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="One structured Markdown file gives any AI model instant, complete context of your entire business — and transforms into a visual, AI-validated, version-controlled strategy model.">
  <meta property="og:title" content="_FORMAT — Business Strategy as Code">
  <meta property="og:description" content="One structured Markdown file gives any AI model instant, complete context of your entire business — and transforms into a visual, AI-validated, version-controlled strategy model.">
  <meta property="og:image" content="https://innv0.github.io/FORMAT/og.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="robots" content="index, follow">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Theme: Simple (Light) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  
  <style>
    :root {
      /* Fonts */
      --base-font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --code-font-family: 'JetBrains Mono', monospace;

      /* Colors */
      --theme-color: #2563eb; /* Modern cobalt blue */
      --base-background-color: #ffffff;
      --base-color: #334155; /* Slate 700 */
      --link-color: var(--theme-color);
      
      /* Sidebar */
      --sidebar-background: #ffffff;
      --sidebar-border-color: #e2e8f0;
      --sidebar-width: 18rem;
      --sidebar-nav-link-color: #475569; /* Slate 600 */
      --sidebar-nav-link-color--active: var(--theme-color);
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-link-border-color--active: var(--theme-color);
      --sidebar-nav-link-border-width--active: 2px;
      
      /* Content */
      --content-max-width: 54rem;
      
      /* Headings */
      --heading-color: #0f172a; /* Slate 900 */
      --heading-font-weight: 600;
      --heading-h1-font-weight: 700;
      
      /* Tables */
      --table-border-color: #e2e8f0;
      --table-head-background: #f8fafc;
      
      /* Pico CSS mappings for the landing page demo splits */
      --pico-primary: #2563eb;
      --pico-muted-color: #64748b;
      --pico-muted-border-color: #e2e8f0;
      --pico-border-radius: 8px;
      --pico-card-background-color: #ffffff;
      --pico-color: #0f172a;
      --pico-card-sectioning-background-color: #f8fafc;
      --mono: 'JetBrains Mono', monospace;
    }

    /* â”€â”€ GLOBAL HEADER (NAVBAR) â”€â”€ */
    .app-nav {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 3.75rem;
      background-color: rgba(255, 255, 255, 0.85) !important;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 2rem;
      z-index: 100;
      margin: 0;
    }
    .app-nav li {
      display: inline-block;
      margin-left: 1.5rem;
      list-style: none;
    }
    .app-nav li a {
      text-decoration: none;
      font-size: 0.9rem;
      color: #475569 !important;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .app-nav li a:hover, .app-nav li a.active {
      color: var(--theme-color) !important;
    }
    
    /* Brand Link (First Item) */
    .app-nav li:first-child {
      position: absolute;
      left: 2rem;
      margin-left: 0;
      font-family: var(--mono);
      font-size: 1rem;
      letter-spacing: 0.08em;
    }
    .app-nav li:first-child a {
      color: #0f172a !important;
      font-weight: 600 !important;
    }

    /* Offset main view and sidebar below header */
    body .content {
      padding-top: 3.75rem !important;
    }
    body .sidebar {
      padding-top: 3.75rem !important;
    }
    body .sidebar-toggle {
      top: 3.75rem !important;
    }

    /* â”€â”€ HOMEPAGE HIDING RULES â”€â”€ */
    body.is-home .sidebar,
    body.is-home .sidebar-toggle {
      display: none !important;
    }
    body.is-home .content {
      left: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      max-width: 100% !important;
    }
    body.is-home .markdown-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* â”€â”€ LANDING PAGE HERO â”€â”€ */
    .hero {
      text-align: center;
      padding: 3.5rem 1rem 3rem;
    }
    .hero h1 {
      font-family: var(--mono);
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }
    .hero h2 {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      color: var(--pico-primary);
      border: none;
      margin-bottom: 1.5rem;
    }
    .hero p {
      max-width: 52ch;
      margin: 0 auto 2rem;
      color: var(--pico-muted-color);
    }
    .hero a[href] {
      margin: 0.25rem 0.375rem;
      display: inline-block;
    }
    .hero a:first-of-type {
      background: var(--pico-primary);
      color: #fff;
      border-radius: var(--pico-border-radius);
      padding: 0.6rem 1.5rem;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9375rem;
    }
    .hero a:first-of-type:hover {
      opacity: 0.9;
    }
    .hero a:last-of-type {
      border: 1px solid var(--pico-muted-border-color);
      color: var(--pico-muted-color);
      border-radius: var(--pico-border-radius);
      padding: 0.6rem 1.5rem;
      text-decoration: none;
      font-size: 0.9375rem;
      background: #ffffff;
    }
    .hero a:last-of-type:hover {
      background: #f8fafc;
    }

    /* â”€â”€ LANDING SECTIONS â”€â”€ */
    section { padding: 4rem 0; }
    section + section { border-top: 1px solid var(--pico-muted-border-color); }
    .hero + section { border-top: none; }

    /* â”€â”€ BLOCKQUOTE â”€â”€ */
    blockquote {
      border-left: 3px solid var(--pico-primary) !important;
      padding-left: 1rem;
      color: #475569;
      margin: 1.5rem 0;
    }

    /* â”€â”€ HOW IT WORKS: numbered steps â”€â”€ */
    .markdown-section ol {
      counter-reset: steps;
      list-style: none;
      padding: 0;
      display: grid;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .markdown-section ol li {
      counter-increment: steps;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
    }
    .markdown-section ol li::before {
      content: counter(steps);
      flex-shrink: 0;
      width: 1.75rem;
      height: 1.75rem;
      background: var(--pico-primary);
      color: #fff;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.1rem;
    }

    /* â”€â”€ OPEN STANDARDS: pill tags â”€â”€ */
    .section-7 { text-align: center; }
    .section-7 ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    .section-7 ul li {
      padding: 0.35rem 1rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 2rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--pico-primary);
    }

    /* â”€â”€ DEMO SPLIT â”€â”€ */
    .demo-split {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1.5rem;
      align-items: center;
      margin: 2rem 0;
    }
    .demo-col { display: flex; flex-direction: column; gap: 0.75rem; min-width: 0; overflow: hidden; }
    .demo-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--pico-muted-color);
      margin-bottom: 0.25rem;
    }
    .demo-label code {
      font-size: 0.75rem;
      background: none;
      padding: 0;
      color: var(--pico-primary);
    }
    .demo-code {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 1.25rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      line-height: 1.65;
      overflow-x: auto;
      white-space: pre;
      margin: 0;
      color: var(--pico-muted-color);
      width: 100%;
      box-sizing: border-box;
    }
    .dm-comment { color: var(--pico-primary); opacity: 0.7; }
    .dm-bullet  { color: var(--pico-primary); font-weight: 700; }
    .dm-item    { color: var(--pico-color); font-weight: 500; }

    .demo-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--pico-primary);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .demo-arrow svg { width: 2rem; height: 2rem; }
    .demo-arrow-line {
      width: 1px;
      height: 2rem;
      background: var(--pico-muted-border-color);
    }

    /* demo UI panel */
    .demo-ui {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      overflow: hidden;
      background: var(--pico-card-background-color);
    }
    .ui-concept { padding: 0; }
    .ui-concept-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: var(--pico-primary);
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
    }
    .ui-emoji { font-size: 1rem; }
    .ui-name  { flex: 1; }
    .ui-count {
      background: rgba(255,255,255,0.25);
      border-radius: 1rem;
      padding: 0.05rem 0.5rem;
      font-size: 0.7rem;
    }
    .ui-elements { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.375rem; }
    .ui-element {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: calc(var(--pico-border-radius) * 0.6);
      color: var(--pico-color);
      flex: 1;
    }
    .ui-score { margin-left: auto; font-size: 0.6rem; letter-spacing: -1px; }
    .ui-score.high { color: var(--pico-primary); }
    .ui-score.mid  { color: var(--pico-muted-color); }

    /* matrix inside demo */
    .ui-matrix { border-top: 1px solid var(--pico-muted-border-color); padding: 0.625rem 0.75rem; }
    .ui-matrix-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--pico-muted-color);
      margin-bottom: 0.4rem;
    }
    .ui-matrix-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.65rem;
      margin: 0;
      table-layout: fixed;
    }
    .ui-matrix-table th, .ui-matrix-table td {
      padding: 0.2rem 0.3rem !important;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--pico-muted-border-color) !important;
      text-align: center;
    }
    .ui-matrix-table td:first-child { text-align: left; color: var(--pico-muted-color); }
    .ui-matrix-table th { background: var(--pico-card-sectioning-background-color) !important; font-weight: 500; }
    .cell-max  { background: rgba(79,130,243,0.15); color: var(--pico-primary); font-weight: 600; }
    .cell-high { background: rgba(79,130,243,0.07); color: var(--pico-primary); }
    .cell-neu  { color: var(--pico-muted-color); }

    @media (max-width: 700px) {
      .demo-split {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .demo-arrow { flex-direction: row; }
      .demo-arrow-line { width: 2rem; height: 1px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    window.$docsify = {
      name: 'FORMAT',
      repo: 'https://github.com/innV0/FORMAT',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'README.md',
      
      // Search integration
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results!',
        depth: 4
      },

      // Custom Plugins
      plugins: [
        // 1. Detect if homepage to hide sidebar
        function(hook, vm) {
          hook.beforeEach(function(html) {
            const isHome = vm.route.path === '/';
            document.body.classList.toggle('is-home', isHome);
            return html;
          });
        },
        // 2. Global clean footer
        function(hook) {
          var footer = [
            '<hr style="border: 0; border-top: 1px solid #e2e8f0; margin-top: 3rem;"/>',
            '<footer>',
            '<div style="text-align: center; padding: 2rem 0; color: #64748b; font-size: 0.85rem;">',
            'FORMAT Â· Open-source Â· MIT License Â· ',
            '<a href="https://github.com/innV0/FORMAT" target="_blank" style="color: var(--theme-color); text-decoration: none;">GitHub</a> Â· ',
            '<a href="mailto:lucas@lucascervera.com" style="color: var(--theme-color); text-decoration: none;">Contact</a>',
            '</div>',
            '</footer>'
          ].join('');

          hook.afterEach(function(html) {
            return html + footer;
          });
        }
      ]
    }
  </script>
  
  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Docsify Themeable -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0"></script>
  
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  
  <!-- Syntax Highlighting (Prism components) -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>

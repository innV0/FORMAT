<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="generator" content="https://skills.innv0.com/innv0-web-design-guide">
  <title>_FORMAT Documentation</title>
  <meta name="description" content="_FORMAT documentation — specification, templates, and guides.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #4D0E4E;
      --base-background: #FFFFFF;
      --textColor: #111112;
      --sidebar-background: #FFFFFF;
      --sidebar-border-color: #F2F2F7;
      --code-background: #FAFAFC;
      --code-color: #4D0E4E;
      --base-font-size: 15px;
      --sidebar-width: 260px;
      --sidebar-nav-link-color--active: #4D0E4E;
      --sidebar-nav-link-border-color--active: #4D0E4E;
    }
    .markdown-section h1 { border-bottom: 2px solid #4D0E4E; padding-bottom: 8px; }
    .markdown-section h2 { border-bottom: 1px solid #F2F2F7; padding-bottom: 6px; margin-top: 2em; }
    .markdown-section code { background: #FAFAFC; padding: 2px 6px; border-radius: 4px; font-size: 90%; color: #4D0E4E; }
    .markdown-section pre > code { background: transparent; padding: 0; color: inherit; }
    .app-nav { position: fixed; top: 0; right: 0; z-index: 100; padding: 10px 20px; }
    .app-nav a { color: #4D0E4E; font-weight: 600; margin-left: 18px; text-decoration: none; font-size: 14px; }
    .app-nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="app"></div>
    <nav class="app-nav">
    <a href="/">Home</a>
    <a href="/app/" target="_blank" rel="noopener noreferrer">Open app</a>
    <a href="/" target="_blank" rel="noopener noreferrer">Open web</a>
    <a href="/documentation/">Documentation</a>
    <a href="https://innv0.com/contact?ref=FORMAT" target="_blank" rel="noopener noreferrer">Contact</a>
    <a href="https://github.com/innV0/FORMAT" target="_blank" rel="noopener noreferrer">GitHub</a>
  </nav>
  <script>
    window.$docsify = {
      name: '_FORMAT Docs',
      repo: 'https://github.com/innV0/FORMAT',
      loadSidebar: true,
      coverpage: false,
      subMaxLevel: 3,
      search: 'auto',
      auto2top: true,
      homepage: 'README.md',
      externalLinkTarget: '_blank',
      alias: {
        '/how-to': 'how-to.md',
        '/onboarding': 'onboarding.md'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script>
    window.addEventListener('load', function () {
      if (typeof Docsify !== 'undefined') {
        Docsify.doneEach(function () {
          if (window.umami) {
            umami.track({ url: window.location.pathname + window.location.search });
          }
        });
      }
    });
  </script>
</body>
</html>
